name: gsecret-retrieval-temp

on:
  push:
    branches:
      - gsecret-retrieval
    paths:
      - '.github/workflows/gsecret-temp-*.yml'
      - '.gsecret-config.json'

jobs:
  retrieve-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Read configuration
        id: config
        run: |
          if [ -f .gsecret-config.json ]; then
            cat .gsecret-config.json
            echo "CONFIG_EXISTS=true" >> $GITHUB_OUTPUT
          else
            echo "CONFIG_EXISTS=false" >> $GITHUB_OUTPUT
            echo "Error: Configuration file not found"
            exit 1
          fi
          
      - name: Export secrets to artifact
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: |
          set -e
          echo "Exporting secrets..."
          mkdir -p secrets-output
          
          # Read configuration
          SECRET_NAMES=$(cat .gsecret-config.json | jq -r '.secret_names[]')
          SECRET_TYPE=$(cat .gsecret-config.json | jq -r '.secret_type')
          
          # Debug: Show what we're retrieving
          echo "Secret type: $SECRET_TYPE"
          echo "Secret names to retrieve:"
          echo "$SECRET_NAMES"
          
          # Create output file
          OUTPUT_FILE="secrets-output/secrets.txt"
          touch "$OUTPUT_FILE"
          
          # Export each secret (base64 encoded for safety)
          while IFS= read -r SECRET_NAME; do
            if [ -z "$SECRET_NAME" ]; then
              continue
            fi
            
            echo "Processing secret: $SECRET_NAME"
            
            # Extract the specific secret value using jq from the ALL_SECRETS env var
            EXTRACTED=$(echo "$ALL_SECRETS" | jq -r --arg name "$SECRET_NAME" '.[$name] // "__NOT_FOUND__"')
            
            if [ "$EXTRACTED" != "__NOT_FOUND__" ] && [ -n "$EXTRACTED" ] && [ "$EXTRACTED" != "null" ]; then
              # Base64 encode the secret value
              ENCODED_VALUE=$(echo -n "$EXTRACTED" | base64 -w 0)
              echo "${SECRET_NAME}=${ENCODED_VALUE}" >> "$OUTPUT_FILE"
              echo "✓ Exported $SECRET_NAME"
            else
              echo "${SECRET_NAME}=__NOT_FOUND__" >> "$OUTPUT_FILE"
              echo "✗ Secret $SECRET_NAME not found or empty"
            fi
          done <<< "$SECRET_NAMES"
          
          echo ""
          echo "Secrets exported successfully"
          cat "$OUTPUT_FILE"
          
      - name: Upload secrets artifact
        uses: actions/upload-artifact@v4
        with:
          name: retrieved-secrets
          path: secrets-output/
          retention-days: 1
